<!DOCTYPE html>
<html>

<head prefix="og:http://ogp.me/ns#">
    <title>Moonlander</title>
    <meta name="description" content="Moonlanderというゲームを実行します。このゲームでは、プレイヤーが宇宙船を上下左右に操作して、デブリを避け目標となるフラッグに着陸することが目的です。フラッグ手前の月面に0.5秒止まるとクリアです。">
    <meta charset="utf-8">
    <meta property="og:url" content="https://moon-alpha.vercel.app/" />
    <meta property="og:type" content="product" />
    <meta property="og:title" content="Moonlander" />
    <meta property="og:description" content="Moonlanderというゲームを実行します。このゲームでは、プレイヤーが宇宙船を上下左右に操作して、デブリをかわす目標となるフラッグに着陸することが目的です。フラッグ手前の月面に0.5秒止まるとクリアです。" />
    <meta property="og:site_name" content="Moonlander" />
    <meta property="og:image" content="https://moon-alpha.vercel.app/assets/ogp.jpg" />
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="style.css">
    <script src="//cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>

<body oncontextmenu='return false;' oncopy='return false;'>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1400,
            height: 900,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 80 }, // 重力を強く設定
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let cursors;
        let jetSound;

        let gameStarted = false;

        function showTitle(scene) {
            const title = scene.add.image(scene.game.config.width / 2, scene.game.config.height / 2, 'title');
            title.setDisplaySize(800, 500); // タイトル画像のサイズ
            title.setInteractive();

            // タイトル画像をカメラに固定
            title.setScrollFactor(0);


            scene.spaceshipShadow.setAlpha(0);

            function startGame() {
                gameStarted = true;
                scene.spaceship.setGravityY(80);
                scene.spaceshipShadow.setAlpha(1);
                scene.tweens.add({
                    targets: title,
                    alpha: 0,
                    duration: 500,
                    onComplete: () => {
                        title.destroy();
                    }
                });
                scene.titleSound.play();
            }

            title.once('pointerup', startGame);
            scene.input.keyboard.once('keydown-ENTER', startGame);
        }

        function restartGame(scene) {
            gameStarted = false;
            scene.spaceship.setVisible(true);
            scene.spaceship.setPosition(scene.game.config.width / 2, 150);
            scene.spaceship.setVelocity(0);
            scene.spaceship.setAcceleration(0);
            scene.spaceship.setGravityY(80);
            scene.scene.resume(); // ゲームシーンを再開
            scene.scene.restart();

            // 燃料ゲージをリセット
            scene.fuel = 200; // 燃料を最大値に戻す
        }

        function preload() {
            this.load.image('background', 'assets/background.jpg');
            this.load.image('spaceship', 'assets/spaceship.png');
            this.load.image('spacemy', 'assets/spacemy.png');
            this.load.image('spaceman', 'assets/spaceman.png');
            this.load.image('spaceshipshadow', 'assets/spaceshipshadow.png');
            this.load.image('flag', 'assets/flag.png');
            this.load.spritesheet('explosion', 'assets/explosion.png', { frameWidth: 256, frameHeight: 256 });
            this.load.image('title', 'assets/title.png');
            this.load.audio('title', 'assets/title.wav'); // ビープ音
            this.load.audio('goal', 'assets/goal.wav'); // ランディング音
            this.load.audio('explosion', 'assets/explosion.wav'); // 爆発音
            this.load.audio('jet', 'assets/jet.wav'); // ジェット音
            this.load.audio('empty', 'assets/empty.wav'); // エンプティー音
            this.load.audio('end', 'assets/end.wav'); // ミッション失敗音

            for (let i = 1; i <= 15; i++) {
                const paddedIndex = i.toString().padStart(2, '0');
                this.load.image(`debris${i}`, `assets/debris${paddedIndex}.png`); //デブリ
            }
        }

        function create() {
            // 的マーカーの描画ヘルパー
            this.drawLandingMarker = (color) => {
                this.landingMarker.clear();
                this.landingMarker.lineStyle(1, color);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 60, 16);
                this.landingMarker.strokeEllipse(this.markerX, this.markerY, 35, 10);
                this.landingMarker.lineBetween(this.markerX - 35, this.markerY, this.markerX + 35, this.markerY);
                this.landingMarker.lineBetween(this.markerX, this.markerY - 10, this.markerX, this.markerY + 10);
            };
            this.currentMarkerColor = 0x00ff00;
            this.astronautMode = false;

            // キーボード入力の設定
            const enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);

            this.add.image(0, 0, 'background').setOrigin(0, 0);

            // 背景画像の幅と高さを取得
            const backgroundImage = this.textures.get('background').getSourceImage();
            const imageWidth = backgroundImage.width;
            const imageHeight = backgroundImage.height;

            // シーンの幅と高さを取得
            const sceneWidth = this.scale.width;
            const sceneHeight = this.scale.height;

            // 背景画像をシーンの中心に配置
            this.add.image(sceneWidth / 2, sceneHeight / 2, 'background').setDisplaySize(imageWidth, imageHeight);
            this.physics.world.gravity.y = 0; // 全体の重力値を設定
            this.fuel = 250; // 燃料の最大値を設定

            // デブリの設定
            this.debrisGroup = this.physics.add.group();
            for (let i = 0; i < Phaser.Math.Between(5, 10); i++) { // デブリのランダム数
                const debrisIndex = Phaser.Math.Between(1, 15); // デブリの表示画像数
                const debris = this.physics.add.sprite(
                    Phaser.Math.Between(0, 2000), // デブリの表示位置の X 座標を 0 から 1400 の範囲に変更
                    Phaser.Math.Between(this.cameras.main.height * 1.5 / 5, this.cameras.main.height * 4 / 5), // デブリの表示位置
                    `debris${debrisIndex}`
                );

                const originalWidth = debris.width;
                const originalHeight = debris.height;
                const newWidth = Phaser.Math.Between(20, 40); //デブリのランダムサイズ
                const newHeight = (newWidth * originalHeight) / originalWidth;

                debris.setDisplaySize(newWidth, newHeight);
                debris.setData('speed', Phaser.Math.FloatBetween(-235, 235)); // デブリの左右のスピードをランダム設定
                debris.setData('rotationSpeed', Phaser.Math.FloatBetween(-5, 5)); // デブリの左右の回転を設定

                this.debrisGroup.add(debris);
            }

            // 燃料ゲージの枠を作成（縦型、宇宙船に追従）
            this.fuelGaugeBorder = this.add.graphics({ lineStyle: { width: 2, color: 0xFFFFFF }, fillStyle: { color: 0xFFFFFF } });
            this.fuelGaugeBorder.strokeRect(0, 0, 8, 50);
            this.fuelGaugeBorder.setDepth(9);

            // 燃料ゲージを作成（縦型、宇宙船に追従）
            this.fuelGauge = this.add.graphics({ fillStyle: { color: 0xaf3035 } });
            this.fuelGauge.fillRect(1, 1, 6, 48);
            this.fuelGauge.setDepth(9);


            // 着陸エリアのスプライトを作成
            this.moon = this.add.sprite(Phaser.Math.Between(100, this.game.config.width - 100), this.game.config.height - 98, 'flag');
            this.physics.add.existing(this.moon, true);
            this.moon.body.allowGravity = false;
            this.moon.displayWidth = 80;
            this.moon.displayHeight = 70;
            this.moon.body.setSize(30, 5, false).setOffset(0, this.moon.displayHeight - 5 + 5);

            // ゴール地面の的（楕円＋十字線）を作成して点滅させる
            this.markerX = this.moon.x + 6;
            this.markerY = this.moon.y + this.moon.displayHeight / 2 + 5;
            this.landingMarker = this.add.graphics();
            this.drawLandingMarker(0x00ff00);
            this.tweens.add({
                targets: this.landingMarker,
                alpha: 0.2,
                duration: 800,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });

            // 宇宙船のスプライトを作成
            const spaceshipTexture = Phaser.Math.Between(1, 20) === 1 ? 'spacemy' : 'spaceship';
            this.spaceship = this.physics.add.sprite(this.game.config.width / 2, 150, spaceshipTexture);
            this.spaceship.setCollideWorldBounds(true); // 画面外に出ないように設定
            this.spaceship.setDrag(0); // 慣性の設定
            this.spaceship.setAngularDrag(8); // 慣性の設定
            this.spaceship.setMaxVelocity(100000); // 最大速度の設定
            this.spaceship.setGravityY(80);
            this.spaceship.displayWidth = 50;
            this.spaceship.displayHeight = 50;
            const bodyRadius = Math.floor(this.spaceship.width / 3);
            this.spaceship.body.setCircle(bodyRadius);
            this.spaceship.body.setOffset(this.spaceship.width / 2 - bodyRadius, this.spaceship.height / 2 - bodyRadius);
            this.spaceship.defaultTextureName = 'spaceship';

            // 着陸の影を作成
            this.spaceshipShadow = this.add.image(this.spaceship.x, this.moon.y + 47, 'spaceshipshadow');
            this.spaceshipShadow.displayWidth = 50; // 宇宙船と同じサイズに設定
            this.spaceshipShadow.displayHeight = 50; // 宇宙船と同じサイズに設定

            this.cursors = this.input.keyboard.createCursorKeys();
            this.titleSound = this.sound.add('title', { loop: false, volume: 0.05 });
            this.goalSound = this.sound.add('goal', { loop: false, volume: 0.05 });
            this.goalTimer = 0;
            this.explosionSound = this.sound.add('explosion', { loop: false, volume: 1 });
            this.emptySound = this.sound.add('empty', { loop: true, volume: 0.1 });
            this.endSound = this.sound.add('end', { loop: false, volume: 0.3 });
            jetSound = this.sound.add('jet', { loop: true, volume: 0.5 });
            cursors = this.input.keyboard.createCursorKeys();

            // ジェット噴射用パーティクルテクスチャを生成
            const jetGfx = this.make.graphics({ add: false });
            jetGfx.fillStyle(0xffffff);
            jetGfx.fillCircle(3, 3, 3);
            jetGfx.generateTexture('jetParticle', 6, 6);
            jetGfx.destroy();

            // 粉塵パーティクル用テクスチャ（薄いベージュの丸）
            const dustGfx = this.make.graphics({ add: false });
            dustGfx.fillStyle(0xc8b89a);
            dustGfx.fillCircle(3, 3, 3);
            dustGfx.generateTexture('dustParticle', 6, 6);
            dustGfx.destroy();

            // 粉塵パーティクル用テクスチャ（大きめの煙）
            const dustGfxLarge = this.make.graphics({ add: false });
            dustGfxLarge.fillStyle(0xa8a8a8);
            dustGfxLarge.fillCircle(8, 8, 8);
            dustGfxLarge.generateTexture('dustLarge', 16, 16);
            dustGfxLarge.destroy();

            // 粉塵パーティクルエミッター（中央・左・右から舞い上がる煙）
            const dustParticles = this.add.particles('dustLarge');

            // 粉塵エミッター5つ（左→左中→中央→右中→右）
            const dustAngles = [
                { min: 190, max: 220 },  // 左
                { min: 230, max: 260 },  // 左中
                { min: 280, max: 310 },  // 右中
                { min: 320, max: 350 },  // 右
            ];
            this.dustEmitters = dustAngles.map(angle => {
                return dustParticles.createEmitter({
                    speed: { min: 30, max: 80 },
                    angle: angle,
                    scale: { start: 0.2, end: 1.8 },
                    alpha: { start: 0.4, end: 0 },
                    lifespan: { min: 600, max: 1300 },
                    frequency: 20,
                    quantity: 2,
                    on: false
                });
            });

            // ジェット噴射パーティクルエミッター（方向ごと）
            const emitterConfig = (angle) => ({
                speed: { min: 60, max: 140 },
                angle: angle,
                scale: { start: 0.5, end: 0 },
                alpha: { start: 0.7, end: 0 },
                lifespan: 200,
                frequency: 25,
                quantity: 2,
                on: false
            });

            this.jetParticles = {
                up: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 75, max: 105 })),
                down: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 255, max: 285 })),
                left: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: -15, max: 15 })),
                right: this.add.particles('jetParticle').createEmitter(emitterConfig({ min: 165, max: 195 }))
            };

            // 爆発アニメーションの作成
            this.anims.create({
                key: 'explode',
                frames: this.anims.generateFrameNumbers('explosion', { start: 0, end: 64 }),
                frameRate: 24,
                repeat: 0,
                onUpdate: function (anim, frame, gameObject) {
                    if (frame.prevFrame !== null) {
                        gameObject.setTexture(frame.texture.key, frame.prevFrame.textureSourceIndex);
                    }
                },
                onComplete: function (anim, frame, gameObject) {
                    gameObject.destroy();
                }
            });

            // コントローラーの作成
            const arrows = ['left', 'up', 'down', 'right']
            const buttons = arrows.map((cursor) => document.getElementById(cursor))
            buttons.forEach((v, i) => {
                v.addEventListener('touchstart', () => this.cursors[arrows[i]].isDown = true);
                v.addEventListener('touchend', () => this.cursors[arrows[i]].isDown = false);
            })

            // カメラの初期位置とズームを設定
            this.cameras.main.centerOn(this.spaceship.x, this.spaceship.y);
            this.cameras.main.setZoom(1.2);

            // カメラのズームが変更されたときにタイトル画像のスケールを調整するリスナーを追加
            this.cameras.main.addListener('zoomchange', (cam, newZoom) => {
                title.setScale(1 / newZoom);
            });

            showTitle(this);
        }

        function update(time, delta) {
            // 宇宙飛行士操作モード（手動制御、物理エンジン不使用）
            if (this.astronautMode && this.astronaut) {
                const dt = delta / 1000;
                const moveSpeed = 80;
                const gravity = 200;
                const jumpPower = -150;
                const onGround = this.astronaut.y >= this.astronautGroundY;

                // 左右移動
                if (this.cursors.left.isDown) {
                    this.astronaut.x -= moveSpeed * dt;
                    this.astronaut.setFlipX(true);
                } else if (this.cursors.right.isDown) {
                    this.astronaut.x += moveSpeed * dt;
                    this.astronaut.setFlipX(false);
                }

                // ジャンプ
                if (this.cursors.up.isDown && onGround) {
                    this.astronautVY = jumpPower;
                }

                // 重力＋位置更新
                this.astronautVY += gravity * dt;
                this.astronaut.y += this.astronautVY * dt;

                // 地面で止まる
                if (this.astronaut.y >= this.astronautGroundY) {
                    this.astronaut.y = this.astronautGroundY;
                    this.astronautVY = 0;
                }

                // カメラを宇宙飛行士に追従
                const cam = this.cameras.main;
                const currentX = cam.scrollX + cam.width / 2;
                const currentY = cam.scrollY + cam.height / 2;
                cam.centerOn(
                    Phaser.Math.Linear(currentX, this.astronaut.x, 0.04),
                    Phaser.Math.Linear(currentY, this.astronaut.y, 0.04)
                );

                // デブリは飛び続ける
                const camLeft = cam.scrollX;
                const camRight = cam.scrollX + cam.width / cam.zoom;
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;
                    const margin = debris.displayWidth;
                    if (debris.x > camRight + margin) {
                        debris.x = camLeft - margin;
                    } else if (debris.x < camLeft - margin) {
                        debris.x = camRight + margin;
                    }
                });
                this.debrisGroup.getChildren().forEach((debris) => {
                    debris.angle += debris.getData('rotationSpeed');
                });
                return;
            }

            if (!gameStarted) {
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);
                return;
            }

            if (gameStarted) {
                // 宇宙船の速度に基づいてカメラの位置を調整（パララックス効果）
                const maxCameraOffset = 100;
                const offsetX = Phaser.Math.Clamp(-this.spaceship.body.velocity.x / 50, -maxCameraOffset, maxCameraOffset);
                const offsetY = Phaser.Math.Clamp(-this.spaceship.body.velocity.y / 50, -maxCameraOffset, maxCameraOffset);

                // カメラの遅延追従（宇宙船が中心からズレ、カメラが遅れてついてくる）
                const targetX = this.spaceship.x + offsetX;
                const targetY = this.spaceship.y + offsetY;
                const cam = this.cameras.main;
                const currentX = cam.scrollX + cam.width / 2;
                const currentY = cam.scrollY + cam.height / 2;
                const lerpSpeed = 0.04;
                cam.centerOn(
                    Phaser.Math.Linear(currentX, targetX, lerpSpeed),
                    Phaser.Math.Linear(currentY, targetY, lerpSpeed)
                );

                // ズーム効果を設定
                const zoomSpeed = 0.0003 * delta;
                const lowerThirdBoundary = this.game.config.height * (2 / 3);
                let zoomTarget;

                if (this.spaceship.y > lowerThirdBoundary) {
                    zoomTarget = 1.8;
                } else {
                    zoomTarget = 0.8;
                }

                this.cameras.main.setZoom(Phaser.Math.Linear(this.cameras.main.zoom, zoomTarget, zoomSpeed));

                // 燃料ゲージを宇宙船の右側に追従させる
                const gaugeX = this.spaceship.x + 35;
                const gaugeY = this.spaceship.y - 25;
                const fuelRatio = this.fuel / 250;
                const fuelHeight = fuelRatio * 48;

                this.fuelGaugeBorder.setPosition(gaugeX, gaugeY);
                this.fuelGauge.clear().fillStyle(0xaf3035).fillRect(1, 1 + (48 - fuelHeight), 6, fuelHeight);
                this.fuelGauge.setPosition(gaugeX, gaugeY);

                
                // ジェット音の再生タイミング
                if (cursors.up.isDown || cursors.down.isDown || cursors.left.isDown || cursors.right.isDown) {
                    if (!jetSound.isPlaying) {
                        jetSound.play();
                    }
                } else {
                    if (jetSound.isPlaying) {
                        jetSound.stop();
                    }
                }

                // 燃料を消費
                if ((this.input.keyboard.createCursorKeys().up.isDown ||
                    this.input.keyboard.createCursorKeys().down.isDown ||
                    this.input.keyboard.createCursorKeys().left.isDown ||
                    this.input.keyboard.createCursorKeys().right.isDown) && this.fuel > 0) {
                    this.fuel -= 1;
                }

                // 燃料がなくなったら操作を無効にする
                if (this.fuel <= 0) {
                    this.cursors.up.isDown = false;
                    this.cursors.down.isDown = false;
                    this.cursors.left.isDown = false;
                    this.cursors.right.isDown = false;
                }

                // 燃料が90以下になったら点滅させる
                if (this.fuel <= 90) {
                    const blinkColor = (Math.floor(Date.now() / 400) % 2) === 0 ? 0xaf3035 : 0xffe8f1;
                    const blinkFuelHeight = (this.fuel / 250) * 48;
                    this.fuelGauge.clear().fillStyle(blinkColor).fillRect(1, 1 + (48 - blinkFuelHeight), 6, blinkFuelHeight);

                    // 燃料が90以下でサウンドが再生されていない場合、emptysoundを再生
                    if (!this.emptySound.isPlaying) {
                        this.emptySound.play();
                    }
                }

                if (this.cursors.up.isDown) {
                    this.spaceship.setAccelerationY(-500);
                } else if (this.cursors.down.isDown) {
                    this.spaceship.setAccelerationY(500);
                } else {
                    this.spaceship.setAccelerationY(0);
                }

                if (this.cursors.left.isDown) {
                    this.spaceship.setAccelerationX(-500);
                    this.spaceship.angle = Math.max(this.spaceship.angle - 2, -35); // 左へ最大35度傾ける
                } else if (this.cursors.right.isDown) {
                    this.spaceship.setAccelerationX(500);
                    this.spaceship.angle = Math.min(this.spaceship.angle + 2, 35); // 右へ最大35度傾ける
                } else {
                    this.spaceship.setAccelerationX(0);
                    // 宇宙船の角度を徐々に0度に戻す
                    if (this.spaceship.angle < 0) {
                        this.spaceship.angle = Math.min(this.spaceship.angle + 2, 0);
                    } else if (this.spaceship.angle > 0) {
                        this.spaceship.angle = Math.max(this.spaceship.angle - 2, 0);
                    }
                }

                // ジェット噴射パーティクルの位置更新とon/off
                const sx = this.spaceship.x;
                const sy = this.spaceship.y;
                const hasFuel = this.fuel > 0;

                this.jetParticles.up.setPosition(sx, sy + 25);
                this.jetParticles.down.setPosition(sx, sy - 25);
                this.jetParticles.left.setPosition(sx + 25, sy);
                this.jetParticles.right.setPosition(sx - 25, sy);

                this.jetParticles.up.on = this.cursors.up.isDown && hasFuel;
                this.jetParticles.down.on = this.cursors.down.isDown && hasFuel;
                this.jetParticles.left.on = this.cursors.left.isDown && hasFuel;
                this.jetParticles.right.on = this.cursors.right.isDown && hasFuel;

                // 宇宙船の影の位置を更新（宇宙船の真下、地面の高さ）
                this.spaceshipShadow.x = this.spaceship.x;
                this.spaceshipShadow.y = this.moon.y + 58;

                // ゴールエリアからの高さを計算
                const heightAboveGoal = Math.max(this.spaceship.y - (this.moon.y - 260), 0);

                // 透明度を計算（高さに応じて0〜1の範囲）
                const shadowAlpha = heightAboveGoal / 260;
                this.spaceshipShadow.alpha = shadowAlpha;

                // 影のサイズを計算（高さに応じて50〜100の範囲）
                const shadowSize = 110 - (heightAboveGoal / 4.6);
                this.spaceshipShadow.displayWidth = shadowSize;
                this.spaceshipShadow.displayHeight = shadowSize;

                // 地面に近い＋ジェット噴射中の時だけ粉塵を左右に舞い上がらせる
                const groundDistance = (this.game.config.height - 63) - (this.spaceship.y + 25);
                const isThrusting = this.cursors.up.isDown || this.cursors.down.isDown || this.cursors.left.isDown || this.cursors.right.isDown;
                if (groundDistance < 150 && groundDistance > 0 && isThrusting && this.fuel > 0) {
                    const dustY = this.game.config.height - 65;
                    const intensity = 1 - (groundDistance / 150); // 0(遠い)〜1(地面すれすれ)
                    const freq = Math.max(5, 30 - intensity * 25);
                    const qty = Math.ceil(1 + intensity * 3);
                    const spd = 30 + intensity * 80;

                    const offsets = [-8, -3, 3, 8];
                    this.dustEmitters.forEach((e, i) => {
                        e.setPosition(this.spaceship.x + offsets[i], dustY);
                        e.on = true;
                        e.setFrequency(freq);
                        e.setQuantity(qty);
                        e.setSpeed({ min: spd * 0.5, max: spd });
                    });
                } else {
                    this.dustEmitters.forEach(e => e.on = false);
                }
            }

            // 着陸エリアに接触した時にクリア
            const landingZone = new Phaser.Geom.Rectangle(
                this.moon.x - this.moon.displayWidth / 2,
                this.moon.y + this.moon.displayHeight / 2 - 5 + 5,
                this.moon.displayWidth,
                5
            );

            // ターゲットマークの色フェード（ゴール上空に近づくほど緑→オレンジ）
            const inGoalX = Math.abs(this.spaceship.x - this.moon.x) < this.moon.displayWidth / 2;
            const distY = this.moon.y - this.spaceship.y;
            let markerT = 0; // 0=緑, 1=オレンジ
            if (inGoalX && distY < 300 && distY > 0) {
                markerT = 1 - (distY / 300); // 近いほど1に
            } else if (inGoalX && distY <= 0) {
                markerT = 1;
            }
            // 緑(0x00ff00)→オレンジ(0xff8800)を補間
            const r = Math.round(0x00 + (0xff - 0x00) * markerT);
            const g = Math.round(0xff + (0x88 - 0xff) * markerT);
            const b = Math.round(0x00 + (0x00 - 0x00) * markerT);
            const newColor = (r << 16) | (g << 8) | b;
            if (newColor !== this.currentMarkerColor) {
                this.currentMarkerColor = newColor;
                this.drawLandingMarker(newColor);
            }

            const isLevel = Math.abs(this.spaceship.angle) <= 5; // 水平から±5度以内
            const speed = Math.sqrt(
                this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
            );
            const isSlow = speed < 80; // ゆっくり降下中のみ

            if (isLevel && isSlow && Phaser.Geom.Intersects.RectangleToRectangle(this.spaceship.getBounds(), landingZone)) {
                // コトンと着地：即座に停止して接地感を出す
                this.spaceship.setVelocity(0);
                this.spaceship.setAcceleration(0);
                this.spaceship.setGravityY(0);
                this.spaceship.angle = 0;

                this.goalSound.play();

                // ゴール時にjet音を停止
                if (jetSound.isPlaying) {
                    jetSound.stop();
                }

                // エンプティー音を停止
                if (this.emptySound.isPlaying) {
                    this.emptySound.stop();
                }

                // ジェット噴射・粉塵パーティクルを停止
                this.jetParticles.up.on = false;
                this.jetParticles.down.on = false;
                this.jetParticles.left.on = false;
                this.jetParticles.right.on = false;
                this.dustEmitters.forEach(e => e.on = false);

                // 燃料ゲージ・ターゲットマーク・デブリを非表示
                this.fuelGaugeBorder.setVisible(false);
                this.fuelGauge.setVisible(false);
                this.landingMarker.setVisible(false);
                this.debrisGroup.getChildren().forEach(d => d.setVisible(false));

                gameStarted = false; // 操作を無効化

                // ハシゴが出てきて、宇宙飛行士が降りてくる演出
                this.time.delayedCall(1000, () => {
                    // ハシゴを描画（宇宙船の下から伸びる）
                    const ladderX = this.spaceship.x - 5;
                    const ladderTop = this.spaceship.y + 20;
                    const ladderBottom = this.spaceship.y + 45;
                    const ladder = this.add.graphics({ lineStyle: { width: 1, color: 0xcccccc } });
                    ladder.setDepth(7);

                    // ハシゴがスッと伸びるアニメーション
                    let ladderProgress = 0;
                    const ladderTween = this.tweens.addCounter({
                        from: 0,
                        to: 1,
                        duration: 800,
                        ease: 'Sine.easeOut',
                        onUpdate: (tween) => {
                            ladderProgress = tween.getValue();
                            const currentBottom = ladderTop + (ladderBottom - ladderTop) * ladderProgress;
                            ladder.clear();
                            ladder.lineStyle(1, 0xcccccc);
                            // 2本の縦線
                            ladder.lineBetween(ladderX - 3, ladderTop, ladderX - 3, currentBottom);
                            ladder.lineBetween(ladderX + 3, ladderTop, ladderX + 3, currentBottom);
                            // 横棒（3本）
                            const steps = 7;
                            for (let s = 0; s <= steps; s++) {
                                const stepY = ladderTop + (currentBottom - ladderTop) * (s / steps);
                                if (stepY <= currentBottom) {
                                    ladder.lineBetween(ladderX - 3, stepY, ladderX + 3, stepY);
                                }
                            }
                        },
                        onComplete: () => {
                            // ハシゴが伸びきったら宇宙飛行士が降りてくる
                            const astronaut = this.add.image(
                                ladderX,
                                ladderTop,
                                'spaceman'
                            );
                            astronaut.setDisplaySize(15, 15);
                            astronaut.setDepth(8);

                            this.tweens.add({
                                targets: astronaut,
                                y: ladderBottom + 5,
                                duration: 1500,
                                ease: 'Sine.easeInOut',
                                onComplete: () => {
                                    // そのまま操作可能にする（物理不要、手動制御）
                                    this.astronaut = astronaut;
                                    this.astronautGroundY = astronaut.y; // 地面のY座標を記憶
                                    this.astronautVY = 0; // 縦方向の速度
                                    this.astronautMode = true; // 宇宙飛行士操作モード

                                    // ズームイン
                                    this.tweens.add({
                                        targets: this.cameras.main,
                                        zoom: 2.5,
                                        duration: 1000,
                                        ease: 'Sine.easeInOut'
                                    });
                                }
                            });
                        }
                    });
                });
            } else {
                this.goalTimer = 0; // 触れていない場合、タイマーをリセットする
            }

            // 宇宙船が地面に達したかどうかを確認（ゴール成功時は除外）
            if (gameStarted && this.spaceship.y + this.spaceship.displayHeight / 2 >= this.game.config.height - 63) {
                const groundSpeed = Math.sqrt(
                    this.spaceship.body.velocity.x * this.spaceship.body.velocity.x +
                    this.spaceship.body.velocity.y * this.spaceship.body.velocity.y
                );
                const groundLevel = Math.abs(this.spaceship.angle) <= 5;

                if (groundLevel && groundSpeed < 80) {
                    // ゆっくり水平着地：爆発せずコトンと停止、ミッション失敗
                    this.spaceship.setVelocity(0);
                    this.spaceship.setAcceleration(0);
                    this.spaceship.setGravityY(0);
                    this.spaceship.angle = 0;

                    if (jetSound.isPlaying) { jetSound.stop(); }
                    if (this.emptySound.isPlaying) { this.emptySound.stop(); }
                    this.jetParticles.up.on = false;
                    this.jetParticles.down.on = false;
                    this.jetParticles.left.on = false;
                    this.jetParticles.right.on = false;
                    this.dustEmitters.forEach(e => e.on = false);

                    this.add.text(this.spaceship.x, this.spaceship.y - 50, 'Mission Failed', { fontSize: '32px', fill: '#FFF' }).setOrigin(0.5, 0.5).setDepth(11);
                    this.endSound.play();
                    gameStarted = false;

                    this.time.delayedCall(3000, () => {
                        restartGame(this);
                    });
                } else {
                    // 速すぎるor傾いている：爆発
                    gameOver(this, 'Mission Failed');
                }
            }

            // デブリの移動
            const cam = this.cameras.main;
            const camLeft = cam.scrollX;
            const camRight = cam.scrollX + cam.width / cam.zoom;
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.x += debris.getData('speed') * this.sys.game.loop.delta / 500;

                // カメラの表示範囲の端から端へ折り返す
                const margin = debris.displayWidth;
                if (debris.x > camRight + margin) {
                    debris.x = camLeft - margin;
                } else if (debris.x < camLeft - margin) {
                    debris.x = camRight + margin;
                }
            });

            // デブリの回転
            this.debrisGroup.getChildren().forEach((debris) => {
                debris.angle += debris.getData('rotationSpeed');
            });

            // 宇宙船とデブリとの衝突をチェック
            this.physics.overlap(this.spaceship, this.debrisGroup, () => {
                gameOver(this, 'Craaaash!');
            });

        }

        let explosionPlaying = false;

        function gameOver(scene, message) {
            // 爆発時にjet音を停止
            if (jetSound.isPlaying) {
                jetSound.stop();
            }

            if (!explosionPlaying) {
                explosionPlaying = true;

                // 爆発アニメーションを作成して再生
                const explosion = scene.add.sprite(scene.spaceship.x, scene.spaceship.y, 'explosion');
                explosion.setDepth(10);
                explosion.play('explode');

                // 爆発音を再生
                scene.explosionSound.play();

                // ジェット噴射・粉塵パーティクルを停止
                scene.jetParticles.up.on = false;
                scene.jetParticles.down.on = false;
                scene.jetParticles.left.on = false;
                scene.jetParticles.right.on = false;
                scene.dustEmitters.forEach(e => e.on = false);

                // 宇宙船を非表示にする
                scene.spaceship.setVisible(false);

                // 宇宙船の影を非表示にする
                scene.spaceshipShadow.setVisible(false);

                explosion.on('animationcomplete', () => {
                    explosionPlaying = false;
                    explosion.destroy();
                });

                // ゲームオーバーメッセージを2秒遅らせて表示する
                setTimeout(() => {
                    scene.add.text(scene.spaceship.x, scene.spaceship.y - 50, message, { fontSize: '32px', fill: '#FFF' }).setOrigin(0.5, 0.5).setDepth(11);
                }, 1000); // 2000ミリ秒（2秒）後に実行

                // ゲームのアップデートを爆発アニメーションが終了してから停止する
                setTimeout(() => {
                    scene.scene.pause();
                }, 3000); // 3000ミリ秒（3秒）後に実行

                // setTimeout(() => {
                //     resetGame(scene);
                // }, 3000);

                gameStarted = false; // ゲームが開始されていない状態に戻す
                setTimeout(() => {
                    scene.scene.restart();
                }, 3000);

                // 爆発時にエンプティー音を停止
                if (scene.emptySound.isPlaying) {
                    scene.emptySound.stop();
                }

            }
        }

    </script>

    <div class="button-container">
        <div class="button-row">
            <div class="button" id="left">　◁　</div>
            <div class="button" id="right">　▷　</div>
            <div class="button" id="up">　△　</div>
            <div class="button" id="down">　▽　</div>
        </div>
    </div>

</body>
